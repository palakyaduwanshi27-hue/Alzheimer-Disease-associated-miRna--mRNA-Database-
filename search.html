<script>
const interactions = {
    "miRNA-21": [{ gene: "APP", type: "Downregulation" }, { gene: "BACE1", type: "Inhibition" }],
    "miRNA-29a": [{ gene: "BACE1", type: "Downregulation" }, { gene: "PSEN1", type: "Downregulation" }],
    "miRNA-155": [{ gene: "TNF", type: "Upregulation" }, { gene: "CD33", type: "Activation" }],
    "miRNA-146a": [{ gene: "TREM2", type: "Downregulation" }, { gene: "IRAK1", type: "Downregulation" }],
    "miRNA-34a": [{ gene: "BCL2", type: "Downregulation" }, { gene: "SIRT1", type: "Inhibition" }],
    "miRNA-124": [{ gene: "BACE1", type: "Downregulation" }, { gene: "CDK5", type: "Downregulation" }],
    "miRNA-107": [{ gene: "BACE1", type: "Downregulation" }, { gene: "PICALM", type: "Downregulation" }],
    "miRNA-9": [{ gene: "REST", type: "Downregulation" }, { gene: "BACE1", type: "Inhibition" }],
    "miRNA-125b": [{ gene: "CDK5R1", type: "Activation" }, { gene: "Tau (MAPT)", type: "Upregulation" }],
    "miRNA-210": [{ gene: "BDNF", type: "Downregulation" }, { gene: "VEGF", type: "Downregulation" }],
    "miRNA-181": [{ gene: "GRIA2", type: "Downregulation" }, { gene: "SIRT1", type: "Inhibition" }],
    "miRNA-153": [{ gene: "APP", type: "Downregulation" }, { gene: "SNCA", type: "Suppression" }],
    "miRNA-137": [{ gene: "Cdk6", type: "Downregulation" }, { gene: "MAPT", type: "Inhibition" }],
    "miRNA-21": [{ gene: "APP", type: "Downregulation" }, { gene: "BACE1", type: "Inhibition" }]
};

function fetchInteractions() {
    const mirna = document.getElementById("mirna").value.trim();
    const searchQuery = document.getElementById("searchBox").value.trim().toLowerCase();
    const resultsTable = document.querySelector("#results tbody");
    resultsTable.innerHTML = ""; // Clear previous results
    let foundResults = [];
    
    if (mirna) {
        foundResults = interactions[mirna] || [];
    } else if (searchQuery) {
        for (let key in interactions) {
            interactions[key].forEach(interaction => {
                if (key.toLowerCase().includes(searchQuery) || interaction.gene.toLowerCase().includes(searchQuery)) {
                    foundResults.push({ miRNA: key, gene: interaction.gene, type: interaction.type });
                }
            });
        }
    }

    if (foundResults.length > 0) {
        foundResults.forEach(interaction => {
            let row = `<tr>
                        <td>${interaction.miRNA || mirna}</td>
                        <td>${interaction.gene}</td>
                        <td>${interaction.type}</td>
                    </tr>`;
            resultsTable.innerHTML += row;
        });
    } else {
        resultsTable.innerHTML = `<tr><td colspan="3">No interactions found</td></tr>`;
    }

    if (email === "") {

    }
});

}
</script>
